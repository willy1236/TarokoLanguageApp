<!doctype html>
<html lang="zh-Hant">
<head>

  <meta name="viewport" content="width=1600, initial-scale=1" />
  <title>語見太魯閣 — Kari Truku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <template id="__bundler_thumbnail">

      <path d="M50 22 L78 50 L50 78 L22 50 Z" fill="none" stroke="#C9A961" stroke-width="2"/>

      <circle cx="50" cy="50" r="2" fill="#C9A961"/>

  </template>

<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="design-tokens.jsx"></script>
  <script type="text/babel" src="screens-login.jsx"></script>
  <script type="text/babel" src="screens-home.jsx"></script>
  <script type="text/babel" src="screens-learn.jsx"></script>
  <script type="text/babel" src="screens-learn-hub.jsx"></script>
  <script type="text/babel" src="screens-exam-sim.jsx"></script>

  <script type="text/babel" src="screens-shop.jsx"></script>
  <script type="text/babel" src="screens-reward.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;
    const { IOSDevice } = window;

    function PhoneFrame({ children, dark = false }) {
      return <IOSDevice width={402} height={874} dark={dark}>{children}</IOSDevice>;
    }

    function App() {

            </DCArtboard>

              <PhoneFrame>
                <window.ExamPart1 />
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="exam-p2" label="04d 第二部分 · 選擇題(一)" width={402} height={874}>
              <PhoneFrame>
                <window.ExamPart2 />
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="exam-p3" label="04e 第三部分 · 選擇題(二)" width={402} height={874}>
              <PhoneFrame>
                <window.ExamPart3 />
              </PhoneFrame>
            </DCArtboard>

              <PhoneFrame>
                <window.ExamPart4 />
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="mode" label="05 選擇模式 · 學習 / 答題" width={402} height={874}>
              <PhoneFrame>
                <window.LearnModePickScreen />
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="lesson" label="06 單字卡 · 發音學習" width={402} height={874}>

            <DCArtboard id="compose" label="15 發布 · Smpung" width={402} height={874}>
